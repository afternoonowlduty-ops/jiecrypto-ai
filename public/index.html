<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>jiecrypto.ai — Free AI Chat, Image & Video Generator</title>
  <meta name="description" content="Chat with AI, generate images, and create videos — completely free, no sign-up required. jiecrypto.ai is your all-in-one AI assistant for text, image, and video generation." />
  <!--#robots-->
  <link rel="canonical" href="__SITE_ORIGIN__/" />

  <!-- Social sharing (Open Graph / Twitter) -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="jiecrypto.ai" />
  <meta property="og:title" content="jiecrypto.ai — Free AI Chat, Image & Video Generator" />
  <meta property="og:description" content="Chat with AI, generate images, and create videos — completely free, no sign-up required." />
  <meta property="og:url" content="__SITE_ORIGIN__/" />
  <meta property="og:image" content="__SITE_ORIGIN__/og.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="jiecrypto.ai — Free AI Chat, Image & Video Generator" />
  <meta name="twitter:description" content="Chat with AI, generate images, and create videos — completely free, no sign-up required." />
  <meta name="twitter:image" content="__SITE_ORIGIN__/og.png" />

  <!-- Structured data for rich results -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "jiecrypto.ai",
    "url": "__SITE_ORIGIN__/",
    "description": "Free AI chat, image generation, and video generation — no sign-up required.",
    "applicationCategory": "UtilitiesApplication",
    "operatingSystem": "Web",
    "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" }
  }
  </script>

  <meta name="theme-color" content="#0a0b0d" />
  <script>
    // Apply the saved theme before first paint to avoid a flash.
    try { document.documentElement.dataset.theme = localStorage.getItem('jc_theme') || 'dark'; } catch (e) {}
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/style.css" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23f0b90b'%3E%3Cpath d='M13 2 3 14h9l-1 8 10-12h-9l1-8z'/%3E%3C/svg%3E" />
</head>
<body>
  <!-- Shared SVG icon set -->
  <svg xmlns="http://www.w3.org/2000/svg" style="display:none">
    <symbol id="i-bolt" viewBox="0 0 24 24"><path d="M13 2 3 14h9l-1 8 10-12h-9l1-8z"/></symbol>
    <symbol id="i-chat" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></symbol>
    <symbol id="i-image" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></symbol>
    <symbol id="i-video" viewBox="0 0 24 24"><path d="m22 8-6 4 6 4V8Z"/><rect x="2" y="6" width="14" height="12" rx="2"/></symbol>
    <symbol id="i-plus" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></symbol>
    <symbol id="i-send" viewBox="0 0 24 24"><path d="M12 19V5M5 12l7-7 7 7"/></symbol>
    <symbol id="i-menu" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"/></symbol>
    <symbol id="i-close" viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12"/></symbol>
    <symbol id="i-download" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="m7 10 5 5 5-5M12 15V3"/></symbol>
    <symbol id="i-alert" viewBox="0 0 24 24"><path d="m10.3 3.9-8.5 14.2A2 2 0 0 0 3.5 21h17a2 2 0 0 0 1.7-2.9L13.7 3.9a2 2 0 0 0-3.4 0Z"/><path d="M12 9v4M12 17h.01"/></symbol>
    <symbol id="i-trash" viewBox="0 0 24 24"><path d="M3 6h18M8 6V4a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v2M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></symbol>
    <symbol id="i-check" viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5"/></symbol>
    <symbol id="i-attach" viewBox="0 0 24 24"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></symbol>
    <symbol id="i-copy" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></symbol>
    <symbol id="i-sidebar" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v18"/></symbol>
    <symbol id="i-sun" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></symbol>
    <symbol id="i-moon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></symbol>
    <symbol id="i-file" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></symbol>
  </svg>

  <div class="app">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-head">
        <div class="brand">
          <span class="brand-mark"><svg class="ico"><use href="#i-bolt"/></svg></span>
          <span class="brand-name">jiecrypto<span class="brand-tld">.ai</span></span>
        </div>
        <button class="icon-btn sidebar-collapse" id="sidebarCollapse" aria-label="Hide sidebar" title="Hide sidebar">
          <svg class="ico"><use href="#i-sidebar"/></svg>
        </button>
        <button class="icon-btn sidebar-close" id="sidebarClose" aria-label="Close menu">
          <svg class="ico"><use href="#i-close"/></svg>
        </button>
      </div>

      <button class="new-chat-btn" id="newChatBtn">
        <svg class="ico"><use href="#i-plus"/></svg>
        <span>New chat</span>
      </button>

      <nav class="mode-nav" aria-label="Modes">
        <button class="mode-btn active" data-mode="chat">
          <svg class="ico"><use href="#i-chat"/></svg><span>Chat</span>
        </button>
        <button class="mode-btn" data-mode="image">
          <svg class="ico"><use href="#i-image"/></svg><span>Image</span>
        </button>
        <button class="mode-btn" data-mode="video">
          <svg class="ico"><use href="#i-video"/></svg><span>Video</span>
        </button>
      </nav>

      <div class="recents" id="recents">
        <div class="recents-list" id="recentsList"></div>
      </div>

      <div class="sidebar-footer">
        <div class="powered">jiecrypto.ai · Free to use</div>
      </div>
    </aside>

    <div class="backdrop" id="backdrop"></div>

    <!-- Main -->
    <main class="main">
      <header class="topbar">
        <button class="icon-btn hamburger" id="hamburger" aria-label="Open menu">
          <svg class="ico"><use href="#i-menu"/></svg>
        </button>
        <div class="topbar-brand">
          <span class="brand-mark small"><svg class="ico"><use href="#i-bolt"/></svg></span>
          <span>jiecrypto<span class="brand-tld">.ai</span></span>
        </div>
        <div class="topbar-title" id="topbarTitle">Chat</div>
        <button class="icon-btn theme-btn" id="themeToggle" aria-label="Toggle theme">
          <svg class="ico"><use href="#i-sun"/></svg>
        </button>
      </header>

      <!-- Message area -->
      <div class="messages" id="messages">
        <div class="welcome" id="welcome">
          <div class="welcome-glow" aria-hidden="true"></div>
          <div class="welcome-logo"><svg class="ico"><use href="#i-bolt"/></svg></div>
          <h1>What can I create for you?</h1>
          <p>Free AI text, image &amp; video generation.</p>
          <div class="suggestions" id="suggestions"></div>
        </div>
        <div class="message-list" id="messageList" aria-live="polite"></div>
      </div>

      <!-- Options bar (image/video modes) -->
      <div class="options-bar hidden" id="imageOptions">
        <label>Size
          <select id="imgSize">
            <option value="1K">1K</option>
            <option value="2K" selected>2K</option>
            <option value="3K">3K</option>
            <option value="4K">4K</option>
          </select>
        </label>
        <label>Ratio
          <select id="imgRatio">
            <option value="1:1" selected>1:1</option>
            <option value="16:9">16:9</option>
            <option value="9:16">9:16</option>
            <option value="4:3">4:3</option>
            <option value="3:4">3:4</option>
            <option value="3:2">3:2</option>
            <option value="2:3">2:3</option>
            <option value="21:9">21:9</option>
          </select>
        </label>
      </div>

      <div class="options-bar hidden" id="videoOptions">
        <label>Duration
          <select id="vidFrames">
            <option value="81">~3s</option>
            <option value="121" selected>~5s</option>
            <option value="241">~10s</option>
            <option value="441">~18s</option>
          </select>
        </label>
        <label>Ratio
          <select id="vidSize">
            <option value="1280x720" selected>16:9</option>
            <option value="720x1280">9:16</option>
            <option value="768x768">1:1</option>
            <option value="1024x768">4:3</option>
            <option value="768x1024">3:4</option>
          </select>
        </label>
      </div>

      <!-- Composer -->
      <div class="composer">
        <div class="composer-box">
          <div class="attach-strip" id="attachStrip" hidden></div>
          <div class="attach-error" id="attachError" hidden></div>
          <div class="composer-row">
            <button class="attach-btn" id="attachBtn" title="Attach" aria-label="Attach files">
              <svg class="ico"><use href="#i-attach"/></svg>
            </button>
            <textarea id="promptInput" rows="1" placeholder="Ask anything…"></textarea>
            <button id="sendBtn" title="Send" aria-label="Send">
              <svg class="ico"><use href="#i-send"/></svg>
            </button>
          </div>
        </div>
        <div class="composer-hint">AI can make mistakes · videos take a few minutes to generate</div>
        <input type="file" id="fileInput" multiple hidden />
      </div>

      <!-- Mobile bottom navigation -->
      <nav class="bottom-nav" aria-label="Modes">
        <button class="mode-btn active" data-mode="chat">
          <svg class="ico"><use href="#i-chat"/></svg><span>Chat</span>
        </button>
        <button class="mode-btn" data-mode="image">
          <svg class="ico"><use href="#i-image"/></svg><span>Image</span>
        </button>
        <button class="mode-btn" data-mode="video">
          <svg class="ico"><use href="#i-video"/></svg><span>Video</span>
        </button>
      </nav>
    </main>
  </div>

  <!-- Image lightbox -->
  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Image viewer" hidden>
    <div class="lightbox-controls">
      <a class="lb-btn" id="lightboxDownload" download aria-label="Download image">
        <svg class="ico"><use href="#i-download"/></svg>
      </a>
      <button class="lb-btn" id="lightboxClose" aria-label="Close">
        <svg class="ico"><use href="#i-close"/></svg>
      </button>
    </div>
    <img id="lightboxImg" alt="" />
  </div>

  <script src="/app.js"></script>
</body>
</html>
